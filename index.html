<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Кафе Късметче ☕ — Елинор Вендинг</title>

<!-- Google tag (gtag.js) — Google Analytics -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-0QYY2HY8P7"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'G-0QYY2HY8P7');
</script>

<style>
  :root {
    --cream: #f6f1ea;
    --cream-deep: #ece2d2;
    --coffee: #6f4e37;
    --coffee-dark: #4a3424;
    --ink: #3a2e26;
    --slip: #fffdf8;
    --gold-1: #b8860b;
    --gold-2: #e7c66a;
    --gold-3: #fff3c9;
  }

  * { box-sizing: border-box; }

  body {
    font-family: -apple-system, "Segoe UI", Arial, sans-serif;
    text-align: center;
    background: radial-gradient(circle at 50% 0%, var(--cream) 0%, var(--cream-deep) 100%);
    color: var(--ink);
    margin: 0;
    padding: 48px 20px;
    min-height: 100vh;
  }

  .container { max-width: 560px; margin: auto; }

  .brand {
    font-size: 15px;
    letter-spacing: 0.04em;
    color: var(--coffee);
    margin: 0 0 28px;
    font-weight: 600;
  }

  h1 {
    color: var(--coffee-dark);
    font-size: 26px;
    line-height: 1.3;
    font-weight: 700;
    margin: 0 0 32px;
  }

  button {
    background: var(--coffee);
    color: #fff;
    border: none;
    padding: 16px 28px;
    border-radius: 12px;
    font-size: 18px;
    cursor: pointer;
    transition: opacity 0.2s ease, transform 0.05s ease;
    box-shadow: 0 6px 18px rgba(74, 52, 36, 0.22);
  }

  button:hover { opacity: 0.92; }
  button:active { transform: translateY(1px); }

  /* Чашата (празно състояние) */
  .cup-wrap { margin: 6px auto 30px; }
  .cup { width: 132px; height: auto; display: block; margin: 0 auto; }

  .steam { animation: steam 3.4s ease-in-out infinite; }
  .steam.s2 { animation-delay: 1.1s; }
  .steam.s3 { animation-delay: 2.2s; }

  @keyframes steam {
    0%   { opacity: 0; transform: translateY(6px); }
    25%  { opacity: 0.5; }
    60%  { opacity: 0.28; }
    100% { opacity: 0; transform: translateY(-14px); }
  }

  /* Бележката (резултат) — всичко на едно листче */
  #result.hidden { display: none; }

  .receipt {
    max-width: 360px;
    margin: 8px auto 0;
    background: var(--slip);
    border-radius: 14px;
    padding: 28px 28px 24px;
    box-shadow: 0 10px 30px rgba(74, 52, 36, 0.14);
    border-top: 3px dashed var(--cream-deep);
    border-bottom: 3px dashed var(--cream-deep);
  }

  .receipt-head {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 9px;
    font-size: 13px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--coffee);
    font-weight: 600;
  }
  .receipt-head svg { width: 24px; height: 24px; flex: none; }

  .perf { border-top: 1.5px dashed var(--cream-deep); margin: 18px 0; }

  .receipt-label {
    font-size: 12px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--coffee);
    margin-bottom: 14px;
  }

  .receipt-fortune {
    font-family: Georgia, "Times New Roman", serif;
    font-size: 25px;
    line-height: 1.42;
    color: var(--ink);
  }

  .receipt-foot {
    font-size: 14px;
    line-height: 1.7;
    color: var(--coffee-dark);
  }

  .brand-name { color: var(--coffee); font-weight: 600; }
  .receipt.golden .brand-name { color: var(--gold-1); }

  /* Поканата за връщане — откъсваща се част, извън бележката */
  .comeback {
    max-width: 300px;
    margin: 22px auto 0;
    background: var(--cream);
    border: 2px dashed var(--cream-deep);
    border-radius: 12px;
    padding: 14px 18px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 9px;
    font-size: 15px;
    font-weight: 600;
    color: var(--coffee-dark);
  }
  .comeback svg { width: 24px; height: 24px; flex: none; }

  /* Златна бележка */
  .receipt.golden {
    background: linear-gradient(135deg, var(--gold-3) 0%, var(--gold-2) 100%);
    border-color: var(--gold-1);
    box-shadow: 0 12px 32px rgba(184, 134, 11, 0.35);
  }
  .receipt.golden .receipt-head,
  .receipt.golden .receipt-label { color: var(--gold-1); }
  .receipt.golden .perf { border-color: rgba(184, 134, 11, 0.5); }

  /* Появяване */
  .reveal { animation: rise 0.5s ease both; }
  @keyframes rise {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @media (prefers-reduced-motion: reduce) {
    .steam { animation: none; opacity: 0.35; }
    .reveal { animation: none; }
    button { transition: none; }
  }
</style>
</head>

<body>

<div class="container">
  <p id="brand" class="brand">☕ Елинор Вендинг ООД</p>
  <h1 id="title">Изтегли своето кафе-късметче</h1>

  <div id="cupWrap" class="cup-wrap">
    <svg class="cup" viewBox="0 0 140 160" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <g fill="none" stroke="#6f4e37" stroke-width="3.5" stroke-linecap="round">
        <path class="steam s1" d="M56,86 q-9,-13 0,-25 q9,-12 0,-25" />
        <path class="steam s2" d="M70,88 q-9,-13 0,-26 q9,-13 0,-26" />
        <path class="steam s3" d="M84,86 q-9,-13 0,-25 q9,-12 0,-25" />
      </g>
      <ellipse cx="70" cy="142" rx="54" ry="9" fill="#ece2d2" />
      <path d="M104,104 C123,102 123,128 104,126" fill="none" stroke="#6f4e37" stroke-width="6" />
      <path d="M34,96 C34,96 38,134 46,138 C54,142 86,142 94,138 C102,134 106,96 106,96 Z" fill="#fffdf8" stroke="#6f4e37" stroke-width="3" />
      <ellipse cx="70" cy="96" rx="37" ry="8" fill="#4a3424" />
    </svg>
  </div>

  <button id="drawBtn" onclick="drawFortune()">Изтегли късметче</button>

  <div id="result" class="hidden"></div>
</div>

<script>
  /* =========================================================
     БИБЛИОТЕКА С КЪСМЕТЧЕТА
     Категории с тегла. За да добавиш ново късметче — просто
     добави нов ред в съответния списък. Теглата отдолу
     определят колко често излиза всяка категория.
     Целева библиотека (за пълнене на партиди):
       усмихнати ~250, вдъхновяващи ~150, кафе-мъдрости ~75,
       микро-предизвикателства ~75, сезонни ~50.
     ========================================================= */

  const library = {
    // Усмихнати / забавни
    smiley: [
      "Днес кафето и доброто настроение вървят заедно.",
      "Усмивката ти е добро начало на деня.",
      "Понякога най-хубавите моменти идват без предупреждение.",
      "Днешният ден има повече възможности, отколкото изглежда.",
      "Кафето вече свърши своята работа. Сега си ти.",
      "Малките радости днес са навсякъде около теб.",
      "Един хубав ден често започва с малка глътка.",
      "Днес заслужаваш една усмивка повече.",
      "Доброто настроение е заразително — започни ти.",
      "Понякога денят става хубав само защото си решил така.",
      "Засмей се днес, без специален повод.",
      "Хубавите дни не чакат — този може да е един от тях."
    ],

    // Вдъхновяващи / позитивни
    inspiring: [
      "Днес те очаква приятна изненада.",
      "Предстои ти хубава среща.",
      "Малка идея днес може да донесе голям успех.",
      "Късметът е по-близо, отколкото мислиш.",
      "Нещо добро вече е на път към теб.",
      "Повярвай си — имаш повече сили, отколкото предполагаш.",
      "Ще получиш добра новина съвсем скоро.",
      "Днес е добър ден да направиш първата крачка.",
      "Една смела стъпка днес струва повече от сто колебания.",
      "Това, което започнеш днес, утре ще ти благодари."
    ],

    // Кафе-мъдрости
    coffee: [
      "Големите идеи обичат доброто кафе.",
      "Всяка глътка е малка пауза за нещо хубаво.",
      "Кафето не бърза. Наслади се на момента.",
      "Добрата енергия започва с добро настроение.",
      "Понякога едно кафе е точно навреме.",
      "Едно кафе, един дъх, един спокоен момент.",
      "Кафето е малка пауза, която денят ти дължи.",
      "Добрият ден мирише на прясно кафе."
    ],

    // Микро-предизвикателства
    challenge: [
      "Направи нещо добро за някого днес.",
      "Кажи \"благодаря\" на човек, който го заслужава.",
      "Усмихни се на себе си.",
      "Намери причина да се гордееш със себе си днес.",
      "Отдели минута за нещо, което ти носи радост.",
      "Изпрати съобщение на човек, за когото се сещаш.",
      "Направи една малка крачка към нещо, което отлагаш.",
      "Похвали някого днес — искрено."
    ]
  };

  // Сезонни по месец (0 = януари ... 11 = декември).
  // Излизат само през съответния месец. Останалите може да се добавят по-късно.
  const seasonal = {
    5: [ // Юни
      "Лятото е покана за повече усмивки.",
      "Днешният ден мирише на хубави моменти."
    ],
    6: [ // Юли
      "Зареди деня си с настроение и кафе.",
      "Лятото е по-хубаво с усмивка."
    ],
    7: [ // Август
      "Отдели миг за себе си.",
      "Наслади се на момента."
    ],
    8: [ // Септември
      "Новият сезон носи нови възможности.",
      "Време е за свеж старт."
    ]
  };

  // Редки златни късметчета (със специален дизайн)
  const goldenFortunes = [
    "Златен ден! Днес всичко ще си дойде на мястото.",
    "Рядко късметче — нещо хубаво те очаква много скоро.",
    "Днес звездите работят за теб.",
    "Днес е твоят златен момент.",
    "Усети го — днес е специален ден."
  ];

  // Тегла на категориите (сборът е 100).
  // Ако даден месец няма сезонни, теглото им се преразпределя автоматично.
  const weights = [
    { key: "smiley",    weight: 40 },
    { key: "inspiring", weight: 24 },
    { key: "coffee",    weight: 12 },
    { key: "challenge", weight: 12 },
    { key: "seasonal",  weight: 7 },
    { key: "golden",    weight: 5 }
  ];

  const STORAGE_KEY = "elinor_kasmet";

  /* ---------- Помощни функции ---------- */

  function todayKey() {
    const d = new Date();
    return d.getFullYear() + "-" + (d.getMonth() + 1) + "-" + d.getDate();
  }

  function randomFrom(arr) {
    return arr[Math.floor(Math.random() * arr.length)];
  }

  function pickFortune() {
    const month = new Date().getMonth();
    const hasSeasonal = seasonal[month] && seasonal[month].length > 0;

    // Активни тегла (без сезонните, ако този месец няма такива)
    const pool = weights.filter(function (w) {
      return w.key !== "seasonal" || hasSeasonal;
    });

    const total = pool.reduce(function (sum, w) { return sum + w.weight; }, 0);
    let roll = Math.random() * total;
    let chosen = pool[0].key;
    for (let i = 0; i < pool.length; i++) {
      if (roll < pool[i].weight) { chosen = pool[i].key; break; }
      roll -= pool[i].weight;
    }

    if (chosen === "golden") {
      return { text: randomFrom(goldenFortunes), golden: true };
    }
    if (chosen === "seasonal") {
      return { text: randomFrom(seasonal[month]), golden: false };
    }
    return { text: randomFrom(library[chosen]), golden: false };
  }

  /* ---------- Показване на състоянията ---------- */

  // Малкият знак на чашата за горната част на бележката
  const cupMark =
    '<svg viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">' +
      '<ellipse cx="20" cy="33" rx="13" ry="2.5" fill="#ece2d2" />' +
      '<path d="M30,19 C37,18 37,27 30,26" fill="none" stroke="#6f4e37" stroke-width="2.4" />' +
      '<path d="M9,16 C9,16 11,30 14,32 C17,34 23,34 26,32 C29,30 31,16 31,16 Z" fill="#fffdf8" stroke="#6f4e37" stroke-width="1.8" />' +
      '<ellipse cx="20" cy="16" rx="11" ry="2.4" fill="#4a3424" />' +
    '</svg>';

  function renderReceipt(fortune, animate) {
    const r = document.getElementById("result");
    const gold = fortune.golden ? " golden" : "";
    const label = fortune.golden ? "Твоето златно късметче" : "Твоето късметче за днес";
    r.innerHTML =
      '<div class="receipt' + gold + (animate ? " reveal" : "") + '">' +
        '<div class="receipt-head">' + cupMark + "Елинор Вендинг ООД</div>" +
        '<div class="perf"></div>' +
        '<div class="receipt-label">' + label + "</div>" +
        '<div class="receipt-fortune">' + fortune.text + "</div>" +
        '<div class="perf"></div>' +
        '<div class="receipt-foot">Благодарим, че избра <span class="brand-name">Елинор Вендинг</span>.</div>' +
      "</div>" +
      '<div class="comeback">' + cupMark + "Утре те чака ново късметче</div>";
    r.classList.remove("hidden");
  }

  function hideIntro(animate) {
    const ids = ["brand", "title", "cupWrap", "drawBtn"];
    ids.forEach(function (id) {
      const el = document.getElementById(id);
      if (!el) return;
      if (animate) {
        el.style.transition = "opacity 0.4s ease, transform 0.4s ease";
        el.style.opacity = "0";
        el.style.transform = "scale(0.96)";
        setTimeout(function () { el.style.display = "none"; }, 400);
      } else {
        el.style.display = "none";
      }
    });
  }

  function drawFortune() {
    const fortune = pickFortune();
    hideIntro(true);

    setTimeout(function () {
      renderReceipt(fortune, true);
    }, 420);

    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify({
        date: todayKey(),
        text: fortune.text,
        golden: fortune.golden
      }));
    } catch (e) {}

    if (typeof gtag === "function") {
      gtag("event", "draw_fortune", { golden: fortune.golden });
    }
  }

  function showAlreadyDrawn(saved) {
    hideIntro(false);
    renderReceipt({ text: saved.text, golden: saved.golden }, false);
  }

  (function init() {
    let saved = null;
    try {
      saved = JSON.parse(localStorage.getItem(STORAGE_KEY));
    } catch (e) {
      saved = null;
    }
    if (saved && saved.date === todayKey()) {
      showAlreadyDrawn(saved);
    }
  })();
</script>

</body>
</html>
